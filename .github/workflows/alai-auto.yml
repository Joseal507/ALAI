name: ALAI Auto Learning

on:
  workflow_dispatch:
  repository_dispatch:
    types: [alai-auto-loop]
  schedule:
    - cron: "*/30 * * * *"

permissions:
  contents: write
  actions: write

concurrency:
  group: alai-auto-learning
  cancel-in-progress: false

jobs:
  learn:
    runs-on: ubuntu-latest
    timeout-minutes: 25

    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
      NODE_ENV: development
      ALAI_AUTO: "true"

      GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
      GROQ_API_KEY_2: ${{ secrets.GROQ_API_KEY_2 }}
      GROQ_API_KEY_3: ${{ secrets.GROQ_API_KEY_3 }}
      GROQ_API_KEY_4: ${{ secrets.GROQ_API_KEY_4 }}
      GROQ_API_KEY_5: ${{ secrets.GROQ_API_KEY_5 }}
      GROQ_API_KEY_6: ${{ secrets.GROQ_API_KEY_6 }}
      GROQ_API_KEY_7: ${{ secrets.GROQ_API_KEY_7 }}

      CEREBRAS_API_KEY: ${{ secrets.CEREBRAS_API_KEY }}
      CEREBRAS_API_KEY_2: ${{ secrets.CEREBRAS_API_KEY_2 }}
      CEREBRAS_API_KEY_3: ${{ secrets.CEREBRAS_API_KEY_3 }}
      CEREBRAS_API_KEY_4: ${{ secrets.CEREBRAS_API_KEY_4 }}
      CEREBRAS_API_KEY_5: ${{ secrets.CEREBRAS_API_KEY_5 }}

      HF_API_KEY: ${{ secrets.HF_API_KEY }}
      HF_API_KEY_2: ${{ secrets.HF_API_KEY_2 }}
      HF_API_KEY_3: ${{ secrets.HF_API_KEY_3 }}
      HF_API_KEY_4: ${{ secrets.HF_API_KEY_4 }}
      HF_API_KEY_5: ${{ secrets.HF_API_KEY_5 }}

      MISTRAL_API_KEY: ${{ secrets.MISTRAL_API_KEY }}

      SAMBANOVA_API_KEY: ${{ secrets.SAMBANOVA_API_KEY }}
      SAMBANOVA_API_KEY_2: ${{ secrets.SAMBANOVA_API_KEY_2 }}
      SAMBANOVA_API_KEY_3: ${{ secrets.SAMBANOVA_API_KEY_3 }}
      SAMBANOVA_API_KEY_4: ${{ secrets.SAMBANOVA_API_KEY_4 }}
      SAMBANOVA_API_KEY_5: ${{ secrets.SAMBANOVA_API_KEY_5 }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node 24
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install
        run: npm ci

      - name: Prepare runtime
        run: |
          mkdir -p logs data
          if [ ! -f data/alai.db ]; then
            echo "No data/alai.db found. Creating empty runtime database path."
            touch data/alai.db
          fi

      - name: Safety guard before
        run: |
          echo "===== SAFETY BEFORE ====="
          node scripts/alai-safety-guard.mjs before | tee logs/safety-before.log

      - name: Snapshot before
        run: |
          echo "===== BEFORE SNAPSHOT ====="
          node scripts/alai-delta-real.mjs | tee logs/before-delta.log || true
          echo
          echo "===== BEFORE REPORT ====="
          npm run alai:report | tee logs/before-report.log || true

      - name: Start ALAI server
        run: |
          echo "===== START SERVER ====="
          nohup npm run dev -- -H 127.0.0.1 -p 6969 > logs/next-server.log 2>&1 &
          echo $! > logs/next-server.pid
          sleep 5

          for i in {1..45}; do
            echo "Waiting for ALAI server... $i"

            echo "----- next log tail -----"
            tail -30 logs/next-server.log || true

            if curl --max-time 2 -fsS http://127.0.0.1:6969/api/health > /dev/null 2>&1; then
              echo "ALAI server is ready."
              exit 0
            fi

            if ! kill -0 $(cat logs/next-server.pid) 2>/dev/null; then
              echo "ALAI server process died."
              cat logs/next-server.log || true
              exit 1
            fi

            sleep 2
          done

          echo "Server failed to become ready."
          cat logs/next-server.log || true
          exit 1

      - name: Run autonomous learning
        run: |
          echo "===== LEARN CLOUD START ====="
          timeout 3m npm run learn:cloud 2>&1 | tee logs/server.log || true
          echo "===== LEARN CLOUD END ====="

      - name: Run research brain
        run: |
          echo "===== RESEARCH BRAIN ====="
          node scripts/alai-research-brain.mjs 2>&1 | tee logs/research-brain.log || true

      - name: Safety guard after
        run: |
          echo "===== SAFETY AFTER ====="
          node scripts/alai-safety-guard.mjs after | tee logs/safety-after.log

      - name: Snapshot after
        run: |
          echo "===== AFTER DELTA ====="
          node scripts/alai-delta-real.mjs | tee logs/after-delta.log || true
          echo
          echo "===== AFTER REPORT ====="
          npm run alai:report | tee logs/after-report.log || true

      - name: Build
        run: |
          echo "===== BUILD ====="
          npm run build 2>&1 | tee logs/build.log

      - name: Git status
        run: |
          echo "===== GIT STATUS ====="
          git status --short | tee logs/git-status.log
          echo
          echo "===== GIT DIFF STAT ====="
          git diff --stat | tee logs/git-diff-stat.log || true

      - name: Commit learning artifacts
        run: |
          git config user.name "alai-bot"
          git config user.email "alai-bot@users.noreply.github.com"

          git add -f data/alai.db seed/alai.seed.db.gz 2>/dev/null || git add -f data/alai.db

          if git diff --cached --quiet; then
            echo "No learning changes to commit." | tee logs/commit.log
          else
            git commit -m "chore: autonomous ALAI learning update" | tee logs/commit.log
            git pull --rebase origin main
            git push origin main | tee -a logs/commit.log
          fi

      - name: Upload learning logs
        uses: actions/upload-artifact@v4
        with:
          name: alai-learning-logs-${{ github.run_number }}
          path: logs/
          retention-days: 7

      - name: Trigger next loop
        if: success()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          echo "===== RE-DISPATCH ====="
          gh api repos/${{ github.repository }}/dispatches \
            -f event_type=alai-auto-loop
