name: ALAI Auto Learning

on:
  workflow_dispatch:
  repository_dispatch:
    types: [alai-auto-loop]

permissions:
  contents: write

concurrency:
  group: alai-auto-learning
  cancel-in-progress: false

jobs:
  learn:
    runs-on: ubuntu-latest
    timeout-minutes: 16

    env:
      LEARN_MODE: cloud
      LEARN_MAX_CYCLES: 1
      LEARN_MAX_MINUTES: 15
      GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
      GROQ_API_KEY_2: ${{ secrets.GROQ_API_KEY_2 }}
      GROQ_API_KEY_3: ${{ secrets.GROQ_API_KEY_3 }}
      GROQ_API_KEY_4: ${{ secrets.GROQ_API_KEY_4 }}
      GROQ_API_KEY_5: ${{ secrets.GROQ_API_KEY_5 }}
      GROQ_API_KEY_6: ${{ secrets.GROQ_API_KEY_6 }}
      GROQ_API_KEY_7: ${{ secrets.GROQ_API_KEY_7 }}
      MISTRAL_API_KEY: ${{ secrets.MISTRAL_API_KEY }}
      CEREBRAS_API_KEY: ${{ secrets.CEREBRAS_API_KEY }}
      CEREBRAS_API_KEY_2: ${{ secrets.CEREBRAS_API_KEY_2 }}
      CEREBRAS_API_KEY_3: ${{ secrets.CEREBRAS_API_KEY_3 }}
      CEREBRAS_API_KEY_4: ${{ secrets.CEREBRAS_API_KEY_4 }}
      CEREBRAS_API_KEY_5: ${{ secrets.CEREBRAS_API_KEY_5 }}
      SAMBANOVA_API_KEY: ${{ secrets.SAMBANOVA_API_KEY }}
      SAMBANOVA_API_KEY_2: ${{ secrets.SAMBANOVA_API_KEY_2 }}
      SAMBANOVA_API_KEY_3: ${{ secrets.SAMBANOVA_API_KEY_3 }}
      SAMBANOVA_API_KEY_4: ${{ secrets.SAMBANOVA_API_KEY_4 }}
      SAMBANOVA_API_KEY_5: ${{ secrets.SAMBANOVA_API_KEY_5 }}
      HF_API_KEY: ${{ secrets.HF_API_KEY }}
      HF_API_KEY_2: ${{ secrets.HF_API_KEY_2 }}
      HF_API_KEY_3: ${{ secrets.HF_API_KEY_3 }}
      HF_API_KEY_4: ${{ secrets.HF_API_KEY_4 }}
      HF_API_KEY_5: ${{ secrets.HF_API_KEY_5 }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - name: Prepare DB
        run: |
          mkdir -p logs data seed
          gzip -dc seed/alai.seed.db.gz > data/alai.db

      - name: Start server
        run: |
          npm run dev -- -p 6969 > logs/server-boot.log 2>&1 &
          sleep 20
          curl -f http://localhost:6969/api/health

      - name: Learn
        run: |
          timeout 15m npm run learn:cloud 2>&1 | tee logs/server.log || true

      - name: Schedule next run
        if: always()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          HOUR=$(TZ=America/Panama date +%H)
          if [ "$HOUR" -ge 9 ] && [ "$HOUR" -le 21 ]; then
            echo "Waiting 20 minutes before next autonomous run..."
            sleep 1200
            gh api repos/${{ github.repository }}/dispatches -f event_type=alai-auto-loop
          else
            echo "Outside learning window. Auto-loop stopped."
          fi

      - name: Upload logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: alai-auto-logs
          path: logs/
