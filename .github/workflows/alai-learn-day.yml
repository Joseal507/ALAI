name: ALAI Learn Day

on:
  workflow_dispatch:
  schedule:
    # Cada 20 min desde 8am hasta 9pm Panamá (ajustar UTC si es necesario)
    - cron: "0,20,40 13-02 * * *"

jobs:
  learn:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install deps
        run: npm ci

      - name: Prepare folders and DB
        run: |
          mkdir -p logs data
          if [ ! -f data/alai.db ] && [ -f seed/alai.seed.db.gz ]; then
            gzip -dc seed/alai.seed.db.gz > data/alai.db
          fi

      - name: Check teacher keys
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          GROQ_API_KEY_2: ${{ secrets.GROQ_API_KEY_2 }}
          GROQ_API_KEY_3: ${{ secrets.GROQ_API_KEY_3 }}
          GROQ_API_KEY_4: ${{ secrets.GROQ_API_KEY_4 }}
          GROQ_API_KEY_5: ${{ secrets.GROQ_API_KEY_5 }}
          MISTRAL_API_KEY: ${{ secrets.MISTRAL_API_KEY }}
          CEREBRAS_API_KEY: ${{ secrets.CEREBRAS_API_KEY }}
          SAMBANOVA_API_KEY: ${{ secrets.SAMBANOVA_API_KEY }}
          HF_API_KEY: ${{ secrets.HF_API_KEY }}
        run: |
          [ -n "$GROQ_API_KEY" ] && echo "GROQ=OK" || echo "GROQ=MISSING"
          [ -n "$MISTRAL_API_KEY" ] && echo "MISTRAL=OK" || echo "MISTRAL=MISSING"
          [ -n "$HF_API_KEY" ] && echo "HF=OK" || echo "HF=MISSING"

      - name: Run ALAI cloud cycle
        env:
          LEARN_MODE: cloud
          LEARN_MAX_CYCLES: 1
          LEARN_MAX_MINUTES: 15
          LEARN_PRIORITY_FIRST: "999"
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          GROQ_API_KEY_2: ${{ secrets.GROQ_API_KEY_2 }}
          GROQ_API_KEY_3: ${{ secrets.GROQ_API_KEY_3 }}
          GROQ_API_KEY_4: ${{ secrets.GROQ_API_KEY_4 }}
          GROQ_API_KEY_5: ${{ secrets.GROQ_API_KEY_5 }}
          MISTRAL_API_KEY: ${{ secrets.MISTRAL_API_KEY }}
          CEREBRAS_API_KEY: ${{ secrets.CEREBRAS_API_KEY }}
          SAMBANOVA_API_KEY: ${{ secrets.SAMBANOVA_API_KEY }}
          HF_API_KEY: ${{ secrets.HF_API_KEY }}
        run: |
          timeout 15m npm run learn:cloud 2>&1 | tee logs/server.log

      - name: Upload logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: alai-learn-log
          path: logs/server.log
