name: ALAI Learn Day

on:
  workflow_dispatch:
  schedule:
    - cron: "17 14,17,20,23 * * *"

jobs:
  learn:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install deps
        run: npm ci

      - name: Prepare folders
        run: mkdir -p logs data

      - name: Start ALAI server
        run: |
          npm run dev -- -p 6969 > logs/server-boot.log 2>&1 &
          sleep 20
          curl -f http://localhost:6969/api/health

      - name: Show server boot logs before learning
        run: cat logs/server-boot.log || true

      - name: Run ALAI cloud cycle
        env:
          LEARN_MODE: cloud
          LEARN_MAX_CYCLES: 1
          LEARN_MAX_MINUTES: 15
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          MISTRAL_API_KEY: ${{ secrets.MISTRAL_API_KEY }}
          CEREBRAS_API_KEY: ${{ secrets.CEREBRAS_API_KEY }}
          SAMBANOVA_API_KEY: ${{ secrets.SAMBANOVA_API_KEY }}
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          timeout 15m npm run learn:cloud 2>&1 | tee logs/server.log

      - name: Upload logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: alai-logs
          path: logs/
